<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='form_style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><linearGradient id=%22grad%22 x1=%220%22 y1=%220%22 x2=%221%22 y2=%221%22><stop offset=%220%25%22 style=%22stop-color:%236366f1;stop-opacity:1%22 /><stop offset=%22100%25%22 style=%22stop-color:%23a855f7;stop-opacity:1%22 /></linearGradient><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22url(%23grad)%22 /><text y=%22.9em%22 x=%2250%22 font-size=%2270%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22serif%22>📓</text></svg>">
</head>
<body>
    <div class="container">
        <div class="card shadow-lg">
            <div class="card-header">
                <h3>📝 Crear Publicación</h3>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('blog.nuevo') }}" method="POST">
                    <div class="mb-4 text-start">
                        <label class="form-label">Título del Pensamiento</label>
                        <input type="text" name="titulo" class="form-control" 
                               placeholder="¿De qué trata hoy?" required>
                    </div>

                    <div class="mb-4 text-start">
                        <label class="form-label">Contenido</label>
                        <textarea name="contenido" class="form-control" rows="6" 
                                  placeholder="Escribe aquí tus ideas..." required></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-save">Guardar Post</button>
                        <a href="{{ url_for('blog.index') }}" class="btn-cancel">Cancelar y volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
